name: Trading Bot Automation

on:
  schedule:
    # Gira ogni sera alle 21:15 UTC (22:15 italiane)
    - cron: '15 21 * * *'
  workflow_dispatch: # Questo ti permette di testarlo subito premendo un tasto

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v3

      - name: Configura Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installa librerie
        run: pip install requests pandas

      - name: Esegui lo script
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python trading_bot.py
